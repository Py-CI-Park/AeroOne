services:
  backend:
    build:
      context: .
      dockerfile: infra/backend/Dockerfile
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ${NEWSLETTER_IMPORT_ROOT_HOST:-./Newsletter/output}:${NEWSLETTER_IMPORT_ROOT_CONTAINER:-/mnt/import/newsletters}:ro
      - ./storage:/app/storage
      - ./backend/data:/app/backend/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: infra/frontend/Dockerfile
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
